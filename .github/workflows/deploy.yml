name: Deploy Frontend to AWS EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # ghcr.io/{GitHub 계정명}/{저장소명} 형태로 자동 구성
  DOCKER_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # ────────────────────────────────────────────────────
  # 1. 빌드 & GHCR 이미지 푸시
  # ────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    environment: sean

    # 패키지(컨테이너 이미지) 쓰기 권한 부여
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # 별도 Secret 불필요 — 자동 제공

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────
  # 2. EC2에 SSH 접속 후 배포
  # ────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    environment: sean
    needs: build-and-push

    steps:
      - name: Checkout source (docker-compose.yml 필요)
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          source:   "docker-compose.yml"
          target:   "~/app"

      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd ~/app

            # GHCR 로그인 (EC2에서 pull 시 필요)
            # GHCR_TOKEN은 읽기 전용 Personal Access Token (classic, read:packages 권한)
            echo "${{ secrets.GHCR_TOKEN }}" | \
              docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # 최신 이미지 pull
            export DOCKER_IMAGE="${{ env.DOCKER_IMAGE }}:${{ github.sha }}"
            docker compose pull

            # 무중단 재시작
            docker compose up -d --remove-orphans

            # 오래된 이미지 정리
            docker image prune -f

            echo "✅ 배포 완료: $DOCKER_IMAGE"
