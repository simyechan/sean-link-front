version: "3.9"
services:
  frontend:
    image: ghcr.io/simyechan/sean-link-front:latest
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    environment:
      - NODE_ENV=production
    networks:
      - sean-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  sean-network:
    external: true
    name: sean-network

  # 필요 시 HTTPS를 위한 Certbot + Nginx Proxy (주석 해제)
